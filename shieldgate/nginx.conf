# ShieldGate 推荐 Nginx 配置
#
# 部署位置：将构建后的前端 (frontend/dist) 复制到 /var/www/shieldgate
# 复制：cp -r frontend/dist /var/www/shieldgate

server {
    listen 80;
    server_name _;

    # —— 前端静态文件（监控大屏 / 配置页 / 封禁管理）——
    location / {
        root /var/www/shieldgate;
        try_files $uri $uri/ /index.html;
        gzip on;
        gzip_types text/javascript application/javascript text/css application/json;
    }

    # —— 管理后台 REST API ——
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        # 重要：用真实远端地址覆盖 X-Forwarded-For，防止客户端伪造
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # —— WebSocket 实时推送 ——
    location /ws {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 86400;
    }
}

# —— 业务流量入口（独立端口 8080，由 ShieldGate 网关接管）——
# 攻击与正常业务请求都打在 80 -> 8080 这条链路上；演示时可让攻击脚本直接打 :8080。
# 若希望对外只暴露 80 端口，取消下面 server 块的注释，并把第一个 server 的业务路径合并进去。
